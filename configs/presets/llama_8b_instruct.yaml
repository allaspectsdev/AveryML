# Llama-3.1-8B-Instruct — Cross-family generalization
# Expected: +3.5pp pass@1 on LCB v6 (12.7% -> 16.2%)
name: llama_8b_instruct_ssd

synthesis:
  model_id: "meta-llama/Llama-3.1-8B-Instruct"
  prompt_source: rstarcoder
  prompt_dataset: ""
  n_samples: 1
  decoding:
    temperature: 1.5
    top_k: 10
    top_p: 0.95
    min_p: 0.0
  backend: vllm
  max_tokens: 131072
  tensor_parallel_size: 1
  output_path: ./data/synthesis/llama_8b_instruct
  output_format: jsonl
  checkpoint_every: 1000
  seed: 42

training:
  model_id: "meta-llama/Llama-3.1-8B-Instruct"
  dataset_path: ./data/synthesis/llama_8b_instruct/synthesis.jsonl
  backend: hf_trainer
  output_dir: ./checkpoints/llama_8b_instruct_ssd
  learning_rate: 5.0e-6
  optimizer: adamw
  weight_decay: 0.01
  lr_scheduler_type: cosine
  global_batch_size: 32
  gradient_accumulation_steps: 4
  max_seq_length: 65536
  num_train_iterations: 2500
  warmup_iterations: 250
  bf16: true
  gradient_checkpointing: true
  packing: true
  save_steps: 500
  logging_steps: 10
  seed: 42

evaluation:
  model_id: ./checkpoints/llama_8b_instruct_ssd/final_checkpoint
  backend: vllm
  benchmark: livecodebench_v6
  decoding:
    temperature: 0.6
    top_k: 20
    top_p: 0.95
    min_p: 0.0
  max_tokens: 131072
  n_repeat: 20
  k_values: [1, 5, 10]
  tensor_parallel_size: 1
  output_path: ./results/llama_8b_instruct
  seeds: [0, 1234, 1234, 1234]
  timeout_per_test: 6.0
  max_workers: 32
